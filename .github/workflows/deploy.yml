name: Deploy
on:
  pull_request:
    branches:
      - main
    types: [closed]
env:
  DEVELOPER_DIR: /Applications/Xcode_26.5.app
  SCHEME_NAME: 'EhPanda'
  ALTSTORE_JSON_PATH: './AltStore.json'
  BUILDS_PATH: '/tmp/action-builds'
  PAYLOAD_PATH: '/tmp/action-builds/Payload'
  FILTER_SWIFT_PATH: './actions-tool/ReleaseNotesFilter.swift'
  FILTER_PATH: '/tmp/action-builds/ReleaseNotesFilter'
  THIN_PAYLOAD_SCRIPT_PATH: './actions-tool/thin-payload.sh'
  ARCHIVE_PATH: '/tmp/action-builds/EhPanda.xcarchive'
  IPA_OUTPUT_PATH: '/tmp/action-builds/EhPanda.ipa'

jobs:
  Deploy:
    runs-on: macos-26
    if: |
      github.event.pull_request.merged == true && (
      github.event.pull_request.user.login == 'aalberrty' ||
      github.event.pull_request.user.login == 'chihchy')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Modify git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Install iOS 26 Platform
        uses: nick-fields/retry@v4
        with:
          retry_on: error
          max_attempts: 10
          timeout_minutes: 999
          command: xcodebuild -downloadPlatform iOS
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Run tests
        run: xcodebuild clean test
          -skipMacroValidation
          -scheme ${{ env.SCHEME_NAME }}
          -destination 'platform=iOS Simulator,name=iPhone Air'
      - name: Xcode archive
        run: xcodebuild archive
          -skipMacroValidation
          -scheme ${{ env.SCHEME_NAME }}
          -destination 'generic/platform=iOS'
          -archivePath ${{ env.ARCHIVE_PATH }}
          CODE_SIGN_IDENTITY=
          CODE_SIGN_ENTITLEMENTS=
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          GCC_OPTIMIZATION_LEVEL=s
          SWIFT_OPTIMIZATION_LEVEL=-O
      - name: Export .ipa file
        run: |
          mkdir -p ${{ env.PAYLOAD_PATH }}
          mv ${{ env.ARCHIVE_PATH }}/Products/Applications/${{ env.SCHEME_NAME }}.app ${{ env.PAYLOAD_PATH }}/${{ env.SCHEME_NAME }}.app
          sh ${{ env.THIN_PAYLOAD_SCRIPT_PATH }} ${{ env.PAYLOAD_PATH }}/${{ env.SCHEME_NAME }}.app
          pushd ${{ env.BUILDS_PATH }}
          zip -r ${{ env.IPA_OUTPUT_PATH }} ./Payload
          popd
      - name: Retrieve data
        id: retrieve-data
        env:
          RELEASE_NOTES_SOURCE: ${{ github.event.pull_request.body }}
        run: |
          swiftc -o "$FILTER_PATH" "$FILTER_SWIFT_PATH"
          chmod +x "$FILTER_PATH"
          app_info_plist="$PAYLOAD_PATH/$SCHEME_NAME.app/Info.plist"
          version="$(plutil -extract CFBundleShortVersionString raw -o - "$app_info_plist")"
          build_version="$(plutil -extract CFBundleVersion raw -o - "$app_info_plist")"
          min_os_version="$(plutil -extract MinimumOSVersion raw -o - "$app_info_plist")"
          size="$(stat -f%z "$IPA_OUTPUT_PATH")"
          sha256="$(shasum -a 256 "$IPA_OUTPUT_PATH" | awk '{ print $1 }')"
          notes="$($FILTER_PATH "$RELEASE_NOTES_SOURCE")"
          privacy="$(
            find "$PAYLOAD_PATH/$SCHEME_NAME.app" -name Info.plist -print0 |
            while IFS= read -r -d '' plist; do
              plutil -convert json -o - "$plist" |
                jq 'to_entries[] | select(.key | endswith("UsageDescription")) | {key: .key, value: (.value | tostring)}'
            done |
            jq -s -c 'from_entries'
          )"

          [[ ! -z "$version" ]] || exit 1
          [[ ! -z "$build_version" ]] || exit 1
          [[ ! -z "$min_os_version" ]] || exit 1
          [[ ! -z "$size" ]] || exit 1
          [[ ! -z "$sha256" ]] || exit 1
          [[ ! -z "$privacy" ]] || exit 1

          {
            echo "size=$size"
            echo "sha256=$sha256"
            echo "version=$version"
            echo "build_version=$build_version"
            echo "marketing_version=$version"
            echo "min_os_version=$min_os_version"
            echo "version_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "privacy=$privacy"
            echo "notes<<__ALTSTORE_NOTES__"
            echo "$notes"
            echo "__ALTSTORE_NOTES__"
          } >> "$GITHUB_OUTPUT"
      - name: Validate data
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          RELEASE_SIZE: ${{ steps.retrieve-data.outputs.size }}
          RELEASE_SHA256: ${{ steps.retrieve-data.outputs.sha256 }}
          RELEASE_NOTES: ${{ steps.retrieve-data.outputs.notes }}
          RELEASE_VERSION: ${{ steps.retrieve-data.outputs.version }}
          RELEASE_BUILD_VERSION: ${{ steps.retrieve-data.outputs.build_version }}
          RELEASE_MARKETING_VERSION: ${{ steps.retrieve-data.outputs.marketing_version }}
          RELEASE_MIN_OS_VERSION: ${{ steps.retrieve-data.outputs.min_os_version }}
          RELEASE_DATE: ${{ steps.retrieve-data.outputs.version_date }}
          RELEASE_PRIVACY: ${{ steps.retrieve-data.outputs.privacy }}
        run: |
          [[ ! -z "$PR_BODY" ]] || exit 1
          [[ ! -z "$PR_TITLE" ]] || exit 1
          [[ ! -z "$RELEASE_SIZE" ]] || exit 1
          [[ ! -z "$RELEASE_SHA256" ]] || exit 1
          [[ ! -z "$RELEASE_NOTES" ]] || exit 1
          [[ ! -z "$RELEASE_VERSION" ]] || exit 1
          [[ ! -z "$RELEASE_BUILD_VERSION" ]] || exit 1
          [[ ! -z "$RELEASE_MARKETING_VERSION" ]] || exit 1
          [[ ! -z "$RELEASE_MIN_OS_VERSION" ]] || exit 1
          [[ ! -z "$RELEASE_DATE" ]] || exit 1
          printf '%s' "$RELEASE_PRIVACY" | jq -e 'type == "object"' >/dev/null
      - name: Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
         fail_on_unmatched_files: true
         files: ${{ env.IPA_OUTPUT_PATH }}
         token: ${{ secrets.GITHUB_TOKEN }}
         body: ${{ github.event.pull_request.body }}
         name: ${{ github.event.pull_request.title }}
         tag_name: 'v${{ steps.retrieve-data.outputs.version }}'
      - name: Update AltStore.json
        env:
          RELEASE_SIZE: ${{ steps.retrieve-data.outputs.size }}
          RELEASE_SHA256: ${{ steps.retrieve-data.outputs.sha256 }}
          RELEASE_VERSION: ${{ steps.retrieve-data.outputs.version }}
          RELEASE_BUILD_VERSION: ${{ steps.retrieve-data.outputs.build_version }}
          RELEASE_MARKETING_VERSION: ${{ steps.retrieve-data.outputs.marketing_version }}
          RELEASE_MIN_OS_VERSION: ${{ steps.retrieve-data.outputs.min_os_version }}
          RELEASE_DATE: ${{ steps.retrieve-data.outputs.version_date }}
          RELEASE_NOTES: ${{ steps.retrieve-data.outputs.notes }}
          RELEASE_PRIVACY: ${{ steps.retrieve-data.outputs.privacy }}
        run: |
          tmp="$(mktemp)"
          jq \
            --arg version "$RELEASE_VERSION" \
            --arg buildVersion "$RELEASE_BUILD_VERSION" \
            --arg marketingVersion "$RELEASE_MARKETING_VERSION" \
            --arg date "$RELEASE_DATE" \
            --arg localizedDescription "$RELEASE_NOTES" \
            --arg downloadURL "https://github.com/EhPanda-Team/EhPanda/releases/download/v$RELEASE_VERSION/EhPanda.ipa" \
            --arg sha256 "$RELEASE_SHA256" \
            --arg minOSVersion "$RELEASE_MIN_OS_VERSION" \
            --argjson size "$RELEASE_SIZE" \
            --argjson privacy "$RELEASE_PRIVACY" \
            '
            .apps[0].category = "entertainment" |
            .apps[0].versions[0] = {
              version: $version,
              buildVersion: $buildVersion,
              marketingVersion: $marketingVersion,
              date: $date,
              localizedDescription: $localizedDescription,
              downloadURL: $downloadURL,
              size: $size,
              sha256: $sha256,
              minOSVersion: $minOSVersion
            } |
            .apps[0].appPermissions = {
              entitlements: [],
              privacy: $privacy
            }
            ' "$ALTSTORE_JSON_PATH" > "$tmp"
          jq empty "$tmp"
          mv "$tmp" "$ALTSTORE_JSON_PATH"
      - name: Commit update AltStore.json
        run: |
          git add "$ALTSTORE_JSON_PATH"
          git commit -m "Update AltStore.json"
          git push origin HEAD
      - name: Post release notes
        env:
          RELEASE_VERSION: ${{ steps.retrieve-data.outputs.version }}
          RELEASE_BODY: ${{ github.event.pull_request.body }}
          RELEASE_NOTES: ${{ steps.retrieve-data.outputs.notes }}
        run: |
         message="$(printf '*v%s Release Notes:*\n%s' "$RELEASE_VERSION" "$RELEASE_BODY")"
         curl https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
         -d parse_mode=markdown -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
         --data-urlencode "text=$message"

         payload="$(jq -n --arg content "**v$RELEASE_VERSION Release Notes:**\n$RELEASE_NOTES" '{content: $content}')"
         curl ${{ secrets.DISCORD_WEBHOOK }} \
         -F "payload_json=$payload"
